<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Free Kick — FC</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#05060a;
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;color:#fff}
  #app{position:fixed;inset:0;cursor:none}
  canvas{display:block}

  /* Start screen — EA-broadcast vibe */
  #start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
    background:radial-gradient(130% 100% at 50% 18%,rgba(18,30,58,.6),rgba(4,7,16,.92));backdrop-filter:blur(2px);
    pointer-events:auto;transition:opacity .55s ease;z-index:10}
  #start.hidden{opacity:0;pointer-events:none}
  #start .eyebrow{letter-spacing:7px;font-size:12px;opacity:.6;text-transform:uppercase}
  #start h1{font-size:74px;font-weight:900;letter-spacing:4px;line-height:.9;
    background:linear-gradient(180deg,#fff,#7fd0ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 10px 50px rgba(80,170,255,.25);text-align:center}
  #start .keys{display:flex;gap:22px;margin-top:4px;flex-wrap:wrap;justify-content:center;max-width:760px}
  #start .k{width:160px;text-align:center;background:rgba(12,20,40,.5);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 10px}
  #start .k .i{font-size:26px;margin-bottom:8px}
  #start .k .d{font-size:12px;opacity:.82;line-height:1.5}
  #start .k b{color:#ffe14d}
  #start button{pointer-events:auto;cursor:pointer;margin-top:6px;font-size:18px;font-weight:800;letter-spacing:3px;color:#04210f;
    background:linear-gradient(180deg,#73f7a9,#21c96b);border:none;border-radius:40px;padding:16px 52px;text-transform:uppercase;
    box-shadow:0 12px 34px rgba(40,220,120,.4);transition:transform .12s,box-shadow .12s}
  #start button:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 16px 42px rgba(40,220,120,.55)}
  #err{position:fixed;inset:0;display:none;align-items:center;justify-content:center;color:#ffb4b4;font-family:monospace;
    font-size:13px;padding:40px;text-align:center;background:#140a0a;z-index:99;white-space:pre-wrap}
</style>
</head>
<body>
  <div id="app"></div>

  <div id="start">
    <div class="eyebrow">EA · FreeKick FC</div>
    <h1>FREE&nbsp;KICK</h1>
    <div class="keys">
      <div class="k"><div class="i">🖱️</div><div class="d"><b>Move</b> to aim the reticle on goal</div></div>
      <div class="k"><div class="i">⏱️</div><div class="d"><b>Hold click</b> for power — release in the <b>green</b> zone</div></div>
      <div class="k"><div class="i">🌀</div><div class="d"><b>After you strike</b>, move mouse / <b>WASD</b> to curl &amp; dip in the air</div></div>
      <div class="k"><div class="i">⚽</div><div class="d">Bend it past the wall &amp; keeper</div></div>
    </div>
    <button id="startBtn">PLAY</button>
  </div>

  <div id="err"></div>

  <script>
  "use strict";
  function boot(){
  // ===================================================================
  //  CONFIG — tune the feel here
  // ===================================================================
  var CONFIG = {
    ballZ:19.0, ballR:0.11, goalW:7.32, goalH:2.44,
    wallDist:9.15, wallCount:4, wallHalfW:1.0, wallBaseH:1.7, wallJump:0.16, wallMargin:0.1,
    wallCenterX:-0.4,
    gravity:10.2, drag:0.05,
    minSpeed:17, maxSpeed:31, chargeTime:1.0,
    timedLo:0.62, timedHi:0.84,         // green "perfect" zone of the power bar
    curlStrength:14.5, dipStrength:20.0, // in-air spin -> acceleration
    spinMax:1.0, spinMouseSens:0.0042, spinKeySens:2.1,
    authNear:0.5, authFar:0.97,          // spin authority fades between these flight fractions
    keeperReact:0.24, keeperDecide:0.17, // reacts, tracks briefly, then COMMITS (late curl beats him)
    keeperSpeed:6.0, keeperRange:2.05, keeperCatchR:0.6, keeperReachY:2.12,
    aimRangeX:5.6, aimYmin:0.2, aimYmax:4.3
  };
  var GOAL_HALF=CONFIG.goalW/2, WALL_Z=CONFIG.ballZ-CONFIG.wallDist;
  var clamp=function(v,a,b){return Math.max(a,Math.min(b,v));};
  var lerp=function(a,b,t){return a+(b-a)*t;};
  var rand=function(a,b){return a+Math.random()*(b-a);};
  var $=function(id){return document.getElementById(id);};
  var TAU=Math.PI*2;

  // ===================================================================
  //  PROCEDURAL AUDIO (WebAudio, no files — works offline)
  // ===================================================================
  var Snd=(function(){
    var ac=null, master=null, crowd=null, crowdGain=null, on=false;
    function init(){
      if(ac) return;
      try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
      master=ac.createGain(); master.gain.value=0.9; master.connect(ac.destination);
      // crowd ambience = filtered noise loop
      var buf=ac.createBuffer(1, ac.sampleRate*2, ac.sampleRate), d=buf.getChannelData(0);
      for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
      crowd=ac.createBufferSource(); crowd.buffer=buf; crowd.loop=true;
      var bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=480; bp.Q.value=0.7;
      crowdGain=ac.createGain(); crowdGain.gain.value=0.07;
      crowd.connect(bp); bp.connect(crowdGain); crowdGain.connect(master); crowd.start();
      on=true;
    }
    function noiseBurst(dur,freq,q,gain,type){
      if(!on) return;
      var n=ac.createBufferSource(), len=Math.floor(ac.sampleRate*dur), b=ac.createBuffer(1,len,ac.sampleRate), dd=b.getChannelData(0);
      for(var i=0;i<len;i++) dd[i]=(Math.random()*2-1);
      n.buffer=b; var f=ac.createBiquadFilter(); f.type=type||'bandpass'; f.frequency.value=freq; f.Q.value=q||1;
      var g=ac.createGain(); g.gain.setValueAtTime(gain,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
      n.connect(f); f.connect(g); g.connect(master); n.start();
    }
    function tone(freq,dur,type,gain,slideTo){
      if(!on) return;
      var o=ac.createOscillator(), g=ac.createGain(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,ac.currentTime);
      if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,ac.currentTime+dur);
      g.gain.setValueAtTime(gain||0.2,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,ac.currentTime+dur);
      o.connect(g); g.connect(master); o.start(); o.stop(ac.currentTime+dur+0.02);
    }
    function swell(target,t){ if(on) crowdGain.gain.linearRampToValueAtTime(target,ac.currentTime+t); }
    return {
      init:init,
      whistle:function(){ tone(2100,0.18,'sine',0.18,2600); setTimeout(function(){tone(2300,0.12,'sine',0.16,2000);},120); },
      kick:function(p){ noiseBurst(0.06,180,0.6,0.5,'lowpass'); tone(90,0.12,'sine',0.5,55); },
      post:function(){ tone(1200,0.5,'triangle',0.4,420); tone(1810,0.5,'sine',0.2,560); },
      crossbar:function(){ tone(900,0.55,'triangle',0.4,300); },
      net:function(){ noiseBurst(0.14,900,0.5,0.35,'bandpass'); },
      save:function(){ noiseBurst(0.08,300,0.6,0.4,'lowpass'); swell(0.16,0.2); setTimeout(function(){swell(0.07,1.2);},400); },
      goal:function(){ swell(0.42,0.25); tone(220,0.7,'sawtooth',0.25); tone(330,0.7,'sawtooth',0.2); tone(440,0.9,'sawtooth',0.18);
        setTimeout(function(){tone(294,0.8,'sawtooth',0.22);tone(370,0.8,'sawtooth',0.18);},220);
        setTimeout(function(){swell(0.09,2.5);},2200); },
      miss:function(){ swell(0.13,0.15); setTimeout(function(){swell(0.06,1.0);},500); },
      ambient:function(){ swell(0.07,1.5); }
    };
  })();

  // ===================================================================
  //  RENDERER / CAMERA
  // ===================================================================
  var canvas=document.createElement('canvas'); canvas.style.display='block'; $('app').appendChild(canvas);
  var ctx=canvas.getContext('2d');
  var W=0,H=0,DPR=1,focal=0,cx=0,cy=0;
  var cam={ eye:{x:0,y:2.55,z:CONFIG.ballZ+4.4}, tgt:{x:0,y:1.25,z:0}, fov:46, shake:0, flash:0, time:1 };
  var camWant={ eye:{x:0,y:2.55,z:CONFIG.ballZ+4.4}, tgt:{x:0,y:1.25,z:0}, fov:46 };
  var bF,bR,bU;
  function vsub(a,b){return{x:a.x-b.x,y:a.y-b.y,z:a.z-b.z};}
  function vcross(a,b){return{x:a.y*b.z-a.z*b.y,y:a.z*b.x-a.x*b.z,z:a.x*b.y-a.y*b.x};}
  function vnorm(a){var l=Math.hypot(a.x,a.y,a.z)||1;return{x:a.x/l,y:a.y/l,z:a.z/l};}
  function buildCam(){
    var sh=cam.shake>0?cam.shake:0;
    var ex=cam.eye.x+(sh?rand(-sh,sh):0), ey=cam.eye.y+(sh?rand(-sh,sh):0);
    eyeR={x:ex,y:ey,z:cam.eye.z};
    bF=vnorm(vsub(cam.tgt,eyeR)); bR=vnorm(vcross(bF,{x:0,y:1,z:0})); bU=vcross(bR,bF);
    focal=(H/2)/Math.tan(cam.fov*Math.PI/360);
  }
  var eyeR={x:0,y:2.55,z:23};
  function P(x,y,z){
    var dx=x-eyeR.x,dy=y-eyeR.y,dz=z-eyeR.z;
    var cx2=dx*bR.x+dy*bR.y+dz*bR.z, cy2=dx*bU.x+dy*bU.y+dz*bU.z, cz=dx*bF.x+dy*bF.y+dz*bF.z;
    if(cz<=0.05) return null;
    return {x:cx+(cx2/cz)*focal, y:cy-(cy2/cz)*focal, z:cz, s:focal/cz};
  }
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2); W=window.innerWidth; H=window.innerHeight;
    canvas.width=W*DPR; canvas.height=H*DPR; canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0); cx=W/2; cy=H/2; buildCam();
  }

  // ---- offscreen textures (built once) ----
  function makeCrowd(w,h){
    var c=document.createElement('canvas'); c.width=w; c.height=h; var g=c.getContext('2d');
    var bg=g.createLinearGradient(0,0,0,h); bg.addColorStop(0,'#0a0f1c'); bg.addColorStop(1,'#161f33');
    g.fillStyle=bg; g.fillRect(0,0,w,h);
    var cols=['#e74c3c','#4aa3df','#ecf0f1','#f1c40f','#2ecc71','#e67e22','#ffffff','#bdc3c7','#1abc9c','#c22','#247'];
    for(var i=0;i<w*h/7;i++){ var yy=Math.random()*h; // dimmer toward the top (shaded upper deck)
      g.fillStyle=cols[(Math.random()*cols.length)|0]; g.globalAlpha=(0.3+Math.random()*0.6)*(0.5+0.5*yy/h);
      var s=1+Math.random()*1.6; g.fillRect(Math.random()*w,yy,s,s*1.3); }
    // horizontal tier shadows (gangways)
    g.globalAlpha=1; g.fillStyle='rgba(0,0,0,0.5)';
    for(var t=0.32;t<1;t+=0.34) g.fillRect(0,h*t,w,Math.max(2,h*0.03));
    return c;
  }
  function makeGrain(s){ var c=document.createElement('canvas'); c.width=c.height=s; var g=c.getContext('2d');
    var d=g.createImageData(s,s); for(var i=0;i<d.data.length;i+=4){ var v=(Math.random()*255)|0;
      d.data[i]=d.data[i+1]=d.data[i+2]=v; d.data[i+3]=18; } g.putImageData(d,0,0); return c; }
  function makeBall(S){
    var c=document.createElement('canvas'); c.width=c.height=S; var g=c.getContext('2d'); var R=S/2;
    g.save(); g.beginPath(); g.arc(R,R,R-1,0,TAU); g.clip();
    var sph=g.createRadialGradient(R*0.66,R*0.6,R*0.1,R,R,R*1.15);
    sph.addColorStop(0,'#ffffff'); sph.addColorStop(0.55,'#eef0f3'); sph.addColorStop(0.85,'#c9ced8'); sph.addColorStop(1,'#9aa1ad');
    g.fillStyle=sph; g.fillRect(0,0,S,S);
    // classic black pentagons
    function pent(cxp,cyp,rad,rot){ g.beginPath(); for(var k=0;k<5;k++){ var a=rot+k*TAU/5-Math.PI/2;
        var px=cxp+Math.cos(a)*rad, py=cyp+Math.sin(a)*rad; k?g.lineTo(px,py):g.moveTo(px,py);} g.closePath(); g.fill(); }
    g.fillStyle='#15171c'; pent(R,R*0.92,R*0.3,0);
    g.globalAlpha=0.92; pent(R*0.42,R*0.58,R*0.2,0.6); pent(R*1.56,R*0.6,R*0.2,-0.6);
    pent(R*0.66,R*1.42,R*0.2,0.3); pent(R*1.34,R*1.42,R*0.2,-0.3); g.globalAlpha=1;
    // seams
    g.strokeStyle='rgba(40,42,50,0.5)'; g.lineWidth=Math.max(1,S*0.012);
    g.beginPath(); g.moveTo(R*0.5,R*0.5); g.lineTo(R*0.9,R*0.95); g.moveTo(R*1.5,R*0.5); g.lineTo(R*1.1,R*0.95); g.stroke();
    g.restore();
    // specular highlight
    var hl=g.createRadialGradient(R*0.62,R*0.5,1,R*0.62,R*0.5,R*0.5);
    hl.addColorStop(0,'rgba(255,255,255,0.55)'); hl.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle=hl; g.beginPath(); g.arc(R*0.62,R*0.5,R*0.5,0,TAU); g.fill();
    return c;
  }
  var crowdTex=null, grainTex=null, ballTex=null;

  // ===================================================================
  //  STATE
  // ===================================================================
  var ST={SETUP:'SETUP',CHARGE:'CHARGE',RUNUP:'RUNUP',FLIGHT:'FLIGHT',RESULT:'RESULT',REPLAY:'REPLAY'};
  var state=ST.SETUP, started=false;
  var aim={x:0.5,y:1.5}, power=0, chargeT=0, perfect=false, knuckle=false;
  var ball={x:0,y:CONFIG.ballR,z:CONFIG.ballZ}, vel={x:0,y:0,z:0}, spin={x:0,y:0}, spinInput={x:0,y:0};
  var ballRot=0, distFrac=0, trail=[], path=[];
  var keeper={x:0,y:0,dive:0,dir:1,react:0,decide:0,targetX:0,committed:false,parry:0};
  var wall={jump:0,t:0};
  var runup=0, kicker={x:-0.9,z:CONFIG.ballZ+0.85,step:0};
  var result=null, resultT=0, caption='', captionT=0, big='', bigT=0, bigColor='#fff';
  var goals=0, shots=0, streak=0, clock=2640; // 44:00
  var replayT=0, replayDur=2.6;
  var keysDown={};
  var last=performance.now();

  // ===================================================================
  //  DRAW: scene
  // ===================================================================
  function quad(p1,p2,p3,p4,col){ if(!p1||!p2||!p3||!p4)return; ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y); ctx.lineTo(p4.x,p4.y); ctx.closePath(); ctx.fill(); }
  function strokeW(a,b,w,col,al){ if(!a||!b)return; ctx.strokeStyle=col; ctx.globalAlpha=al==null?1:al;
    ctx.lineWidth=Math.max(0.6,w); ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); ctx.globalAlpha=1; }

  function drawSky(){
    var g=ctx.createLinearGradient(0,0,0,H*0.66);
    g.addColorStop(0,'#070b16'); g.addColorStop(0.5,'#0d1830'); g.addColorStop(1,'#16294a');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // floodlight pylons at the four back corners, with lamp banks + glow + soft beams
    [[-30,-21],[30,-21],[-22,7],[22,7]].forEach(function(c){
      var fx=c[0], fz=c[1], base=P(fx,0,fz), top=P(fx,18,fz), lamp=P(fx,17,fz); if(!top||!lamp)return;
      strokeW(base,top,Math.max(2,(top.s||4)*0.12),'#070a12',0.9);                 // pole
      var lw=Math.max(10,lamp.s*1.5), lh=Math.max(5,lamp.s*0.5);
      var beam=ctx.createRadialGradient(lamp.x,lamp.y,2,lamp.x,lamp.y,260);          // glow
      beam.addColorStop(0,'rgba(220,235,255,0.45)'); beam.addColorStop(0.4,'rgba(180,205,255,0.12)'); beam.addColorStop(1,'rgba(180,205,255,0)');
      ctx.fillStyle=beam; ctx.beginPath(); ctx.arc(lamp.x,lamp.y,260,0,TAU); ctx.fill();
      ctx.fillStyle='#0a0e18'; roundRect(lamp.x-lw/2,lamp.y-lh/2,lw,lh,3); ctx.fill();   // lamp housing
      for(var i=0;i<8;i++){ ctx.fillStyle='rgba(245,250,255,0.95)';                 // bulbs
        ctx.beginPath(); ctx.arc(lamp.x-lw/2+lw*(i+0.5)/8,lamp.y,Math.max(1.4,lh*0.28),0,TAU); ctx.fill(); }
    });
  }
  function drawStands(){
    // three tiers behind/around using crowd texture mapped onto big quads
    if(!crowdTex) crowdTex=makeCrowd(420,150,'#0e1626');
    function band(p1,p2,p3,p4){
      if(!p1||!p2||!p3||!p4)return;
      var minx=Math.min(p1.x,p2.x,p3.x,p4.x),maxx=Math.max(p1.x,p2.x,p3.x,p4.x);
      var miny=Math.min(p1.y,p2.y,p3.y,p4.y),maxy=Math.max(p1.y,p2.y,p3.y,p4.y);
      ctx.save(); ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y); ctx.lineTo(p4.x,p4.y); ctx.closePath(); ctx.clip();
      ctx.drawImage(crowdTex,minx,miny,Math.max(1,maxx-minx),Math.max(1,maxy-miny)); ctx.restore();
    }
    band(P(-34,2,-22),P(34,2,-22),P(34,11,-23),P(-34,11,-23));     // back
    band(P(-26,1.5,-22),P(-26,10,-23),P(-30,10,6),P(-26,1.5,6));    // left
    band(P(26,1.5,-22),P(26,10,-23),P(30,10,6),P(26,1.5,6));        // right
  }
  function drawAds(t){
    // scrolling advertising boards just behind the goal
    var z=-2.7, txt='   EA SPORTS   ·   IT’S IN THE GAME   ·   FREEKICK FC   ·   ';
    var p1=P(-13,0,z),p2=P(13,0,z),p3=P(13,1.0,z),p4=P(-13,1.0,z);
    quad(p1,p2,p3,p4,'#0b1f3a');
    if(p1&&p2){ ctx.save(); ctx.beginPath(); ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.lineTo(p4.x,p4.y);ctx.closePath(); ctx.clip();
      var h=Math.abs(p1.y-p4.y); ctx.font='800 '+Math.max(8,h*0.62)+'px Trebuchet MS'; ctx.textBaseline='middle'; ctx.fillStyle='#cfe6ff';
      var midY=(p1.y+p4.y)/2, w=p2.x-p1.x, full=ctx.measureText(txt).width||200, off=(t*60)% full;
      for(var sx=p1.x-off; sx<p2.x; sx+=full) ctx.fillText(txt,sx,midY);
      ctx.restore(); }
  }
  function drawPitch(t){
    var Xw=40, zN=eyeR.z-0.5, zF=-20;
    quad(P(-Xw,0,zF),P(Xw,0,zF),P(Xw,0,zN),P(-Xw,0,zN),'#2c7a31');
    var k=0; for(var z=zF; z<zN; z+=2.8){ var z2=Math.min(z+2.8,zN);
      quad(P(-Xw,0,z),P(Xw,0,z),P(Xw,0,z2),P(-Xw,0,z2),(k++%2===0)?'#379139':'#2f8233'); }
    // lines
    function seg(ax,az,bx,bz){ var a=P(ax,0,az),b=P(bx,0,bz); if(a&&b)strokeW(a,b,(a.s+b.s)*0.5*0.12,'#ffffff',0.82); }
    var penD=16.5,penW=40.3,sixD=5.5,sixW=18.3;
    seg(-22,0,22,0); seg(-penW/2,penD,penW/2,penD); seg(-penW/2,0,-penW/2,penD); seg(penW/2,0,penW/2,penD);
    seg(-sixW/2,sixD,sixW/2,sixD); seg(-sixW/2,0,-sixW/2,sixD); seg(sixW/2,0,sixW/2,sixD);
    // penalty arc + spot
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=2; ctx.beginPath(); var startedArc=false;
    for(var a=-0.9;a<=0.9;a+=0.12){ var pp=P(Math.sin(a)*9.15,0,11-Math.cos(a)*9.15); if(!pp){startedArc=false;continue;}
      if(!startedArc){ctx.moveTo(pp.x,pp.y);startedArc=true;} else ctx.lineTo(pp.x,pp.y);} ctx.stroke();
    var sp=P(0,0,11); if(sp){ ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.ellipse(sp.x,sp.y,sp.s*0.14,sp.s*0.06,0,0,TAU); ctx.fill(); }
  }

  // net with deformable grid
  var NW=14, NH=6, netZ=-1.55, netDisp=[];
  (function(){ for(var j=0;j<=NH;j++){ netDisp[j]=[]; for(var i=0;i<=NW;i++) netDisp[j][i]={z:0,v:0}; } })();
  function netNode(i,j){ var x=-GOAL_HALF+(i/NW)*CONFIG.goalW, y=(j/NH)*CONFIG.goalH; return P(x,y,netZ-netDisp[j][i].z); }
  function updateNet(dt){ for(var j=0;j<=NH;j++)for(var i=0;i<=NW;i++){ var n=netDisp[j][i];
      n.v += (-n.z*70 - n.v*7)*dt; n.z += n.v*dt; } }
  function poke(wx,wy,amt){ for(var j=0;j<=NH;j++)for(var i=0;i<=NW;i++){
      var x=-GOAL_HALF+(i/NW)*CONFIG.goalW, y=(j/NH)*CONFIG.goalH, d=Math.hypot(x-wx,y-wy);
      netDisp[j][i].v += amt*Math.exp(-d*d*1.6); } }
  function drawGoalNet(){
    ctx.globalAlpha=0.9;
    for(var j=0;j<=NH;j++)for(var i=0;i<=NW;i++){ var a=netNode(i,j);
      if(i<NW){var b=netNode(i+1,j); strokeW(a,b,1,'#e7f0ff',0.22);}
      if(j<NH){var c=netNode(i,j+1); strokeW(a,c,1,'#e7f0ff',0.22);} }
    ctx.globalAlpha=1;
  }
  function drawGoalFrame(front){

      var lb=P(-GOAL_HALF,0,0),lt=P(-GOAL_HALF,H2,0),rb=P(GOAL_HALF,0,0),rt=P(GOAL_HALF,H2,0);
      var w=(lt?lt.s:8)*0.13;
      strokeW(lb,lt,w,col,1); strokeW(rb,rt,w,col,1); strokeW(lt,rt,w,col,1);
    } else {

      var d=1.55;
      strokeW(P(-GOAL_HALF,H2,-d),P(GOAL_HALF,H2,-d),1.5,col,0.5);

  // depth-sorted scene

  // ===================================================================
  //  COMMENTARY
  // ===================================================================
  var SAY={
    goal:["GOLAZO! He's bent it in!","Top corner — unstoppable!","The keeper had NO chance!","What a free kick!","He's picked his spot beautifully!","Sensational strike!"],
    save:["Brilliant save!","The keeper gets a strong hand to it!","Denied at the last second!","Huge stop!"],
    block:["The wall does its job!","Blocked! Right into the wall.","Charged down!"],
    post:["Off the woodwork!","So close — rattles the post!","Inches away!"],
    miss:["It's flown over!","Wide of the mark.","He'll want that one back.","Dragged it just wide."]
  };
  function say(kind){ var a=SAY[kind]; caption=a[(Math.random()*a.length)|0]; captionT=2.6; }

  // ===================================================================
  //  SHOOTING / PHYSICS
  // ===================================================================
  function beginCharge(){ if(!started||state!==ST.SETUP)return; state=ST.CHARGE; power=0; chargeT=performance.now(); knuckle=!!keysDown['ShiftLeft']||!!keysDown['ShiftRight']; }
  function strike(){
    if(state!==ST.CHARGE)return;
    perfect = power>=CONFIG.timedLo && power<=CONFIG.timedHi;
    chargeT=performance.now();
    // timed accuracy: mistiming adds aim error
    var miss = perfect?0 : Math.min(0.7, Math.abs(power-(CONFIG.timedLo+CONFIG.timedHi)/2))*1.6;
    var ax=aim.x + rand(-miss,miss)*1.3, ay=aim.y + rand(-miss,miss)*0.7 + (power>CONFIG.timedHi?power*0.5:0);
    var speed=lerp(CONFIG.minSpeed,CONFIG.maxSpeed,power);
    var t=CONFIG.ballZ/speed;
    vel={ x:(ax-0)/t, y:(ay-CONFIG.ballR)/t+0.5*CONFIG.gravity*t, z:-speed };
    spin={x:0,y:0}; spinInput={x:0,y:0};
    if(knuckle) spin.x=rand(-0.05,0.05);
    ball={x:0,y:CONFIG.ballR,z:CONFIG.ballZ}; trail=[]; path=[]; distFrac=0;
    keeper.react=CONFIG.keeperReact; keeper.decide=CONFIG.keeperDecide; keeper.committed=false; keeper.targetX=0; keeper.dive=0; keeper.parry=0;
    wall.t=0; wall.jump=0; runup=0; kicker.step=0;
    state=ST.RUNUP;
    Snd.kick(power);
  }
  function authority(){ return clamp(1-(distFrac-CONFIG.authNear)/(CONFIG.authFar-CONFIG.authNear),0,1); }
  function stepFlight(dt){
    var sub=1/240, steps=Math.max(1,Math.round(dt/sub));
    for(var s=0;s<steps;s++){
      // spin ramps toward input
      spin.x=clamp(lerp(spin.x,spinInput.x,1-Math.pow(0.0001,sub)),-CONFIG.spinMax,CONFIG.spinMax);
      spin.y=clamp(lerp(spin.y,spinInput.y,1-Math.pow(0.0001,sub)),-CONFIG.spinMax,CONFIG.spinMax);
      var auth=authority();
      var ax=spin.x*CONFIG.curlStrength*auth;
      var ay=spin.y*CONFIG.dipStrength*auth - CONFIG.gravity;
      if(knuckle){ ax+=Math.sin(distFrac*40)*2.2*auth; }
      var sp=Math.hypot(vel.x,vel.y,vel.z);
      vel.x+=(ax - vel.x*CONFIG.drag)*sub;
      vel.y+=(ay - vel.y*CONFIG.drag)*sub;
      vel.z+=(- vel.z*CONFIG.drag)*sub;
      var pz=ball.z;
      ball.x+=vel.x*sub; ball.y+=vel.y*sub; ball.z+=vel.z*sub;
      ballRot+=sp*sub*1.1;
      distFrac=clamp((CONFIG.ballZ-ball.z)/CONFIG.ballZ,0,1);
      // wall plane
      if(pz>WALL_Z && ball.z<=WALL_Z){
        var wallTopH=CONFIG.wallBaseH+wall.jump+CONFIG.wallMargin;
        if(Math.abs(ball.x-CONFIG.wallCenterX)<=CONFIG.wallHalfW && ball.y<=wallTopH && ball.y>0){
          return settle('block'); }
      }
      // keeper save check near goal line
      if(ball.z<=0.4 && ball.z>0 && !keeper.parry){
        if(Math.abs(ball.x-keeper.x)<CONFIG.keeperCatchR && ball.y<CONFIG.keeperReachY && ball.y>0){
          keeper.parry=1; return settle('save'); }
      }
      // goal plane
      if(pz>0 && ball.z<=0){
        var x=ball.x,y=ball.y;
        var postNear=Math.abs(Math.abs(x)-GOAL_HALF)<CONFIG.ballR+0.04;
        var barNear=Math.abs(y-CONFIG.goalH)<CONFIG.ballR+0.04;
        if(Math.abs(x)<GOAL_HALF-CONFIG.ballR && y>0 && y<CONFIG.goalH-CONFIG.ballR){
          if(Math.abs(x-keeper.x)<CONFIG.keeperCatchR && y<CONFIG.keeperReachY) return settle('save');
          return settle('goal');
        }
        if(postNear && y<CONFIG.goalH) return settle('post');
        if(barNear && Math.abs(x)<GOAL_HALF) return settle('post');
        return settle('miss');
      }
      if(ball.y<CONFIG.ballR){ ball.y=CONFIG.ballR; vel.y=Math.abs(vel.y)*0.4; vel.x*=0.8; vel.z*=0.8;
        if(Math.hypot(vel.x,vel.z)<2 && ball.z>1) return settle('miss'); }
      if(ball.z<-2) return settle('miss');
    }
    // record trail/path
    trail.push({x:ball.x,y:ball.y,z:ball.z}); if(trail.length>14) trail.shift();
    path.push({x:ball.x,y:ball.y,z:ball.z});
  }

  function predictX(){ if(vel.z>=0) return keeper.x; var tg=ball.z/(-vel.z); return clamp(ball.x+vel.x*tg,-CONFIG.keeperRange,CONFIG.keeperRange); }
  function updateKeeper(dt){
    if(keeper.react>0){ keeper.react-=dt; return; }
    if(!keeper.committed){
      keeper.targetX=predictX(); keeper.dir=keeper.targetX<0?-1:1;   // track the ball...
      keeper.decide-=dt;
      if(keeper.decide<=0) keeper.committed=true;                    // ...then COMMIT (late curl now beats him)
    }
    var dx=keeper.targetX-keeper.x, mv=CONFIG.keeperSpeed*dt;
    keeper.x+=clamp(dx,-mv,mv);
    keeper.dive=clamp(keeper.dive+(Math.abs(keeper.targetX)>0.6?dt*3:-dt*2),0,1);
  }
  function updateWall(dt){ wall.t+=dt; wall.jump=Math.max(0, Math.sin(clamp(wall.t/0.42,0,1)*Math.PI))*CONFIG.wallJump; }

  function settle(kind){
    result=kind; resultT=0; state=ST.RESULT; shots++;
    if(kind==='goal'){ goals++; streak++; big='GOAL!'; bigColor='#46e08a'; bigT=1; cam.flash=0.5; cam.shake=0.5; cam.time=0.32;
      poke(ball.x,ball.y,9); Snd.goal(); say('goal'); }
    else if(kind==='save'){ streak=0; big=''; bigT=0; cam.shake=0.25; cam.time=0.5; Snd.save(); say('save'); }
    else if(kind==='block'){ streak=0; cam.shake=0.2; vel.x*=-0.3; vel.z*=-0.4; Snd.kick(0.3); say('block'); }
    else if(kind==='post'){ streak=0; cam.shake=0.3; Snd.post(); say('post'); poke(ball.x,ball.y,3); }
    else { streak=0; Snd.miss(); say('miss'); }
    return true;
  }

  // ===================================================================
  //  CAMERA director
  // ===================================================================
  function setCam(dt){
    if(state===ST.SETUP||state===ST.CHARGE||state===ST.RUNUP){
      camWant.eye={x:aim.x*0.25,y:2.55,z:CONFIG.ballZ+4.4}; camWant.tgt={x:aim.x*0.4,y:1.3,z:2}; camWant.fov=46;
    } else if(state===ST.FLIGHT){
      camWant.eye={x:ball.x*0.45,y:clamp(2.4+ball.y*0.2,2.3,3.4),z:clamp(ball.z+4.2,5,CONFIG.ballZ+4.4)};
      camWant.tgt={x:ball.x*0.6,y:clamp(ball.y*0.7+0.6,0.7,2.4),z:Math.max(0,ball.z-3)}; camWant.fov=44;
    } else if(state===ST.RESULT){
      if(result==='goal'){ camWant.eye={x:ball.x*0.5,y:1.8,z:3.2}; camWant.tgt={x:ball.x,y:1.1,z:-0.5}; camWant.fov=34; }
      else { camWant.eye={x:ball.x*0.4,y:2.2,z:5.5}; camWant.tgt={x:ball.x*0.6,y:1,z:0}; camWant.fov=42; }
    } else if(state===ST.REPLAY){
      camWant.eye={x:13,y:4.5,z:7}; camWant.tgt={x:0,y:1.1,z:4}; camWant.fov=40;
    }
    var k=1-Math.pow(state===ST.REPLAY?0.000001:0.0009,dt);
    cam.eye.x=lerp(cam.eye.x,camWant.eye.x,k); cam.eye.y=lerp(cam.eye.y,camWant.eye.y,k); cam.eye.z=lerp(cam.eye.z,camWant.eye.z,k);
    cam.tgt.x=lerp(cam.tgt.x,camWant.tgt.x,k); cam.tgt.y=lerp(cam.tgt.y,camWant.tgt.y,k); cam.tgt.z=lerp(cam.tgt.z,camWant.tgt.z,k);
    cam.fov=lerp(cam.fov,camWant.fov,k);
    cam.shake=Math.max(0,cam.shake-dt*1.2); cam.flash=Math.max(0,cam.flash-dt*1.4);
    cam.time=lerp(cam.time,1,1-Math.pow(0.2,dt));
    buildCam();
  }

  // ===================================================================
  //  INPUT
  // ===================================================================
  function aimFromMouse(e){ var nx=(e.clientX/window.innerWidth)*2-1, ny=-((e.clientY/window.innerHeight)*2-1);
    aim.x=clamp(nx*CONFIG.aimRangeX,-CONFIG.aimRangeX,CONFIG.aimRangeX);
    aim.y=clamp(lerp(CONFIG.aimYmin,CONFIG.aimYmax,(ny+1)/2),CONFIG.aimYmin,CONFIG.aimYmax); }
  function bindInput(){
    window.addEventListener('mousemove',function(e){ if(!started)return;
      if(state===ST.SETUP) aimFromMouse(e);
      else if(state===ST.FLIGHT){ spinInput.x=clamp(spinInput.x+e.movementX*CONFIG.spinMouseSens,-1,1);
        spinInput.y=clamp(spinInput.y-e.movementY*CONFIG.spinMouseSens,-1,1); } });
    window.addEventListener('mousedown',function(e){ if(e.button!==0||!started)return;
      if(state===ST.SETUP) beginCharge();
      else if(state===ST.RESULT||state===ST.REPLAY) nextKick(); });
    window.addEventListener('mouseup',function(e){ if(e.button===0&&state===ST.CHARGE) strike(); });
    window.addEventListener('keydown',function(e){ keysDown[e.code]=true;
      if(e.code==='Space'){ e.preventDefault();
        if(state===ST.SETUP) beginCharge(); else if(state===ST.CHARGE) strike();
        else if(state===ST.RESULT||state===ST.REPLAY) nextKick(); }
      if(e.code==='KeyR'&&(state===ST.RESULT)&&result==='goal'){ startReplay(); } });
    window.addEventListener('keyup',function(e){ keysDown[e.code]=false; });
    $('startBtn').addEventListener('click',function(){ started=true; $('start').classList.add('hidden');
      Snd.init(); Snd.whistle(); Snd.ambient(); });
  }
  function flightKeys(dt){
    if(keysDown['KeyA']||keysDown['ArrowLeft']) spinInput.x=clamp(spinInput.x-CONFIG.spinKeySens*dt,-1,1);
    if(keysDown['KeyD']||keysDown['ArrowRight']) spinInput.x=clamp(spinInput.x+CONFIG.spinKeySens*dt,-1,1);
    if(keysDown['KeyW']||keysDown['ArrowUp']) spinInput.y=clamp(spinInput.y+CONFIG.spinKeySens*dt,-1,1);
    if(keysDown['KeyS']||keysDown['ArrowDown']) spinInput.y=clamp(spinInput.y-CONFIG.spinKeySens*dt,-1,1);
  }

  // ===================================================================
  //  FLOW
  // ===================================================================
  function startReplay(){ if(!path.length)return; state=ST.REPLAY; replayT=0; }
  function nextKick(){
    state=ST.SETUP; result=null; bigT=0; captionT=Math.min(captionT,0.4);
    ball={x:0,y:CONFIG.ballR,z:CONFIG.ballZ}; vel={x:0,y:0,z:0}; spin={x:0,y:0}; spinInput={x:0,y:0}; trail=[]; path=[];
    keeper={x:0,y:0,dive:0,dir:1,react:0,decide:0,targetX:0,committed:false,parry:0}; wall={jump:0,t:0};
    kicker.step=0; power=0; perfect=false; knuckle=false; clock+=rand(20,45);
  }

  // ===================================================================
  //  MAIN LOOP
  // ===================================================================
  var tSec=0;
  function frame(now){
    requestAnimationFrame(frame);
    var dtReal=Math.min(0.05,(now-last)/1000); last=now; tSec+=dtReal;
    var dt=dtReal*cam.time;
    if(started){
      if(state===ST.CHARGE){ power=clamp((now-chargeT)/1000/CONFIG.chargeTime,0,1); }
      if(state===ST.RUNUP){ runup+=dtReal; kicker.step+=dtReal*22; kicker.x=lerp(-0.9,-0.12,clamp(runup/0.28,0,1)); kicker.z=lerp(CONFIG.ballZ+0.85,CONFIG.ballZ+0.25,clamp(runup/0.28,0,1));
        if(runup>=0.28){ state=ST.FLIGHT; } }
      if(state===ST.FLIGHT){ flightKeys(dtReal); updateWall(dt); updateKeeper(dt); stepFlight(dt); }
      if(state===ST.RESULT){ resultT+=dtReal; bigT=Math.max(0,bigT-dtReal*0.5);
        if(result==='goal'){ if(resultT>2.4 && path.length){ startReplay(); } }
        else if(resultT>1.9){ nextKick(); } }
      if(state===ST.REPLAY){ replayT+=dtReal; if(replayT>=replayDur){ nextKick(); } }
      captionT=Math.max(0,captionT-dtReal*0.5);
    }
    // ball position during replay follows recorded path
    if(state===ST.REPLAY && path.length){ var f=clamp(replayT/(replayDur*0.85),0,1); var idx=Math.min(path.length-1,Math.floor(f*(path.length-1)));
      ball={x:path[idx].x,y:path[idx].y,z:path[idx].z}; }
    updateNet(dtReal);
    setCam(dtReal);
    drawScene(tSec); drawHUD();
  }

  // ===================================================================
  //  TEST HOOK (deterministic; for verification without rAF)
  // ===================================================================
  window.__fk={
    shoot:function(ax,ay,pwr,spinx,spiny,after){ started=true; aim.x=ax; aim.y=ay; power=pwr; state=ST.CHARGE; strike(); state=ST.FLIGHT;
      for(var i=0;i<1200 && state===ST.FLIGHT;i++){
        var go=(after==null)||(distFrac>=after);   // 'after' gates spin to a flight fraction (timed dip/curl)
        spinInput.x=go?(spinx||0):0; spinInput.y=go?(spiny||0):0;
        updateWall(1/120); updateKeeper(1/120); stepFlight(1/120); }
      return {result:result, ballX:+ball.x.toFixed(2), ballY:+ball.y.toFixed(2), keeperX:+keeper.x.toFixed(2)}; },
    reset:function(){ goals=shots=streak=0; nextKick(); }
  };

  window.addEventListener('resize',resize); resize(); bindInput();
  requestAnimationFrame(frame);
  }

  // ---- loader (no WebGL, no CDN — runs anywhere) ----
  (function(){
    try{ boot(); }
    catch(e){ var el=document.getElementById('err'); el.style.display='flex';
      el.textContent='Something broke:\n\n'+(e&&e.stack?e.stack:e); }
  })();
  </script>
</body>
</html>
