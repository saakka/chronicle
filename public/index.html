<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chronicle — a planet of history</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ====================== GLOBE (landing) ====================== -->
  <section id="globe-view">
    <div id="globe"></div>

    <div class="globe-overlay">
      <p class="kicker">✦ &nbsp; a planet of history &nbsp; ✦</p>
      <h1>Chronicle</h1>
      <p class="tagline">Spin the planet. Rest on a country and step through the portal into its past.</p>
    </div>

    <p class="globe-hint" id="globe-hint">
      🌍 Drag to spin · scroll to zoom &nbsp;—&nbsp; <strong>hover a country for a second</strong> to enter
    </p>

    <div class="globe-fallback" id="globe-fallback" hidden></div>
  </section>

  <!-- ====================== PORTAL TRANSITION ====================== -->
  <div id="portal" class="portal" hidden>
    <div class="portal-scene" id="portal-scene"></div>
    <div class="portal-flash"></div>
    <div class="portal-ring"></div>
    <p class="portal-label" id="portal-label"></p>
  </div>

  <!-- ====================== ERA JOURNEY ====================== -->
  <section id="journey" class="journey" hidden>
    <div class="journey-bg">
      <div class="bg-layer" id="bg-a"></div>
      <div class="bg-layer" id="bg-b"></div>
    </div>
    <div class="journey-scrim"></div>

    <button id="exit-btn" class="exit-btn">← &nbsp;Globe</button>
    <button id="sound-btn" class="sound-btn" aria-label="Toggle sound">🔊</button>
    <div class="journey-head"><span id="j-country" class="j-country"></span></div>

    <button class="nav-arrow nav-prev" id="nav-prev" aria-label="Previous era">‹</button>
    <button class="nav-arrow nav-next" id="nav-next" aria-label="Next era">›</button>

    <div class="era-stage" id="era-stage"></div>

    <div class="timeline" id="timeline"></div>
  </section>

  <!-- ====================== LIGHTBOX ====================== -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <figure>
      <img id="lightbox-img" src="" alt="" />
      <figcaption id="lightbox-caption"></figcaption>
    </figure>
  </div>

  <!-- ====================== TOAST ====================== -->
  <div id="toast" class="toast" hidden></div>

  <script src="https://unpkg.com/globe.gl"></script>
  <script src="app.js"></script>
</body>
</html>
